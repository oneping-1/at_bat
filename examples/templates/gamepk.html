<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>MLB Scores</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">
    <style>
      .table-wrapper { max-width: 600px; }
      th { background:#f8f9fa; }
      .plot-wrapper { max-width: 600px; margin-top: 2rem; text-align: center; }
    </style>
</head>
<body>
  <div class="table-wrapper">
    {{ table|safe }}
  </div>

  {% if plot_data %}
  <div class="plot-wrapper">
    <h4>Run-Favor Plot</h4>
    <img src="data:image/png;base64,{{ plot_data }}" alt="Run favor over innings">
  </div>
  {% endif %}
</body>
</html>
